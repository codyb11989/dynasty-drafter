name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  # Daily refresh so the live site's rosters/ADP stay current without a push.
  schedule:
    - cron: "0 11 * * *" # 11:00 UTC (~7am ET)

permissions:
  contents: write # scheduled runs commit refreshed public/data/ back to the repo
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Refresh league data from MFL. If MFL is unreachable, fall back to the
      # data committed in the repo so the deploy still succeeds — but flag it
      # loudly so a stale-data deploy near draft day doesn't go unnoticed.
      - name: Sync MFL data
        run: npm run sync || echo "::warning title=MFL sync failed::Deploying with committed fallback data from public/data/ — check MFL availability"
      # Keep the committed fallback data from going stale: scheduled runs push
      # refreshed JSON back to main. [skip ci] stops the push from triggering a
      # second deploy (this run already deploys the fresh data).
      - name: Commit refreshed data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if ! git diff --quiet public/data; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data
            git commit -m "chore: refresh MFL data snapshot [skip ci]"
            git push
          fi
      - name: Build
        run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
