name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  # Daily refresh so the live site's rosters/ADP stay current without a push.
  schedule:
    - cron: "0 11 * * *" # 11:00 UTC (~7am ET)

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Refresh league data from MFL. If MFL is unreachable, fall back to the
      # data committed in the repo so the deploy still succeeds.
      - name: Sync MFL data
        run: npm run sync || echo "MFL sync failed — building with committed data"
      - name: Build
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
